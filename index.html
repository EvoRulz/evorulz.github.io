<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Habit Tracker</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
  <style>
    * { -webkit-tap-highlight-color: transparent; scrollbar-width: none; -ms-overflow-style: none; }
    *::-webkit-scrollbar { display: none; width: 0; height: 0; }
    .color-settings-row { display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
    .color-settings-row > label { font-size:13px; color:#bbb; width:100%; }
    .color-picker-row { display:flex; align-items:center; gap:8px; flex:1; }
    .alpha-slider { flex:1; height:var(--slider-h,8px); border-radius:var(--slider-r,4px); cursor:pointer; border:1px solid var(--slider-border-color,#555); outline:none; }
    .hex-copy-row { display:flex; align-items:center; gap:6px; flex:0 0 auto; }
    .hex-input { flex:none; width:10ch; background:#111; color:#fff; border:1px solid #555; border-radius:4px; padding:4px 8px; font-size:12px; font-family:monospace; outline:none; text-transform:uppercase; letter-spacing:0.04em; }
    .copy-btn { background:#2a2a2a; border:1px solid #555; border-radius:4px; color:#aaa; cursor:pointer; padding:4px 10px; font-size:12px; flex-shrink:0; }
    .copy-btn:hover { background:#3a3a3a; color:#fff; }
    .copy-btn.copied { color:#99ff99; border-color:#99ff99; }
    #settings-groups-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
    .settings-group-item { padding:8px 10px; background:#2a2a2a; border:1px solid #444; border-radius:6px; color:#aaa; cursor:grab; font-size:13px; text-align:center; touch-action:none; user-select:none; -webkit-user-select:none; box-sizing:border-box; }
    .settings-group-item:active { cursor:grabbing; }
    .settings-group-item.sg-active { background:#333; color:#fff; border-color:#666; }
    .settings-group-content { display:none; flex-direction:column; gap:16px; }
    .settings-group-content.open { display:flex; }
    @keyframes flame-flicker {
      0%   { text-shadow: 0 0 8px #ff4400, 0 0 18px #ff6600, 0 0 32px #ffaa00, 0 0 50px #ff0000; color: #ffcc66; }
      7%   { text-shadow: 0 0 20px #ff2200, 0 0 35px #ff5500, 0 0 55px #ffcc00, 0 0 80px #ff1100; color: #ff7711; }
      13%  { text-shadow: 0 0 5px  #ffaa00, 0 0 12px #ff4400, 0 0 22px #ffdd00, 0 0 38px #ff3300; color: #ffee99; }
      19%  { text-shadow: 0 0 16px #ff3300, 0 0 30px #ff6600, 0 0 48px #ffaa00, 0 0 70px #ff0000; color: #ff8833; }
      26%  { text-shadow: 0 0 9px  #ff6600, 0 0 20px #ff2200, 0 0 36px #ffbb00, 0 0 52px #ff4400; color: #ffcc55; }
      33%  { text-shadow: 0 0 22px #ff1100, 0 0 40px #ff5500, 0 0 62px #ffdd00, 0 0 90px #ff0000; color: #ff6600; }
      39%  { text-shadow: 0 0 4px  #ffcc00, 0 0 10px #ff8800, 0 0 20px #ffee00, 0 0 34px #ff5500; color: #ffeeaa; }
      45%  { text-shadow: 0 0 14px #ff3300, 0 0 26px #ff4400, 0 0 44px #ffaa00, 0 0 65px #ff2200; color: #ff9944; }
      52%  { text-shadow: 0 0 18px #ff5500, 0 0 32px #ff2200, 0 0 50px #ffcc00, 0 0 75px #ff0000; color: #ffbb33; }
      58%  { text-shadow: 0 0 7px  #ffbb00, 0 0 16px #ff6600, 0 0 28px #ffee00, 0 0 42px #ff3300; color: #ffdd77; }
      65%  { text-shadow: 0 0 25px #ff1100, 0 0 45px #ff3300, 0 0 68px #ffaa00, 0 0 95px #ff0000; color: #ff5500; }
      72%  { text-shadow: 0 0 11px #ff4400, 0 0 22px #ff5500, 0 0 38px #ffcc00, 0 0 58px #ff2200; color: #ffcc66; }
      79%  { text-shadow: 0 0 6px  #ff9900, 0 0 14px #ff3300, 0 0 25px #ffdd00, 0 0 40px #ff6600; color: #ffee88; }
      86%  { text-shadow: 0 0 19px #ff2200, 0 0 36px #ff6600, 0 0 56px #ffbb00, 0 0 82px #ff0000; color: #ff7722; }
      92%  { text-shadow: 0 0 8px  #ff5500, 0 0 18px #ff4400, 0 0 32px #ffaa00, 0 0 50px #ff3300; color: #ffcc55; }
      100% { text-shadow: 0 0 8px  #ff4400, 0 0 18px #ff6600, 0 0 32px #ffaa00, 0 0 50px #ff0000; color: #ffcc66; }
    }
    .flame-active {
      animation: flame-flicker 1.8s ease-in-out infinite;
      cursor: pointer;
    }
    .title-span { cursor: pointer; transition: color 0.3s; }
    body {
      margin: 0;
      padding: 20px;
      font-family: sans-serif;
      background: #111;
      color: white;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    body::-webkit-scrollbar { display: none; }

    html::-webkit-scrollbar { display: none; }

    * { scrollbar-width: none !important; -ms-overflow-style: none !important; }

    h1 { margin-top: 0; }

    /* ── App-level buttons (Export All etc) ── */
    .app-btn {

      color: white;

      color: #ff9999;
    }

    #buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }
    .tracker-btn {
      width: 100%;
      box-sizing: border-box;
      padding: 12px 20px;
      background: var(--btn-bg, #444);
      color: var(--btn-fg, #fff);
      font-family: var(--btn-font, sans-serif);
      border: none;
      border-radius: var(--btn-radius, 6px);
      cursor: pointer;
      font-size: 16px;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none; /* required for pointer capture on mobile/TWA */
      transition: box-shadow 0.2s, background 0.2s;
  box-shadow: 0 0 16px 5px var(--btn-glow, rgba(150, 90, 255, 0.65));
    }
    .top-item button { border-radius: 6px; }
    .tracker-btn.active {

      box-shadow: 0 0 16px 5px var(--btn-active-glow, var(--btn-glow, rgba(150, 90, 255, 0.65)));
    }
    .is-dragging .tracker-btn { pointer-events: none; }
    /* Ghost clone shouldn't inherit transitions */
    .tracker-btn.drag-ghost {
      transition: none !important;
    }
    .empty-slot {
      width: 100%;
      box-sizing: border-box;
      border-radius: 6px;
      pointer-events: none;
    }
    .tracker-section {
      display: none;
      margin-top: 20px;
    }

    .controls {
      margin-bottom: 8px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .controls select {
      background: #000;
      color: white;
      border: 1px solid #444;
      padding: 6px;
      font-size: 13px;
      border-radius: 4px;
    }
    .controls button {
      padding: 6px 12px;
      background: #444;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    .controls button.btn-clear {
      background: #5a1a1a;
      color: #ff9999;
    }
    .controls button.btn-clear:hover { background: #7a2020; }

    .stats {
      font-size: 12px;
      color: #888;
      margin-bottom: 6px;
    }

    .scroll-container {
      overflow-y: auto;
      max-height: 80vh;
      overflow-x: auto;
      border: 1px solid #333;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .scroll-container::-webkit-scrollbar { display: none; }

    table { border-collapse: collapse; width: 100%; }
    th, td {
      border: 1px solid var(--app-border-color, #333);
      padding: 6px;
      text-align: center;
      font-size: 12px;
    }
    th {
      position: sticky; top: 0;

    .bar-container { width: 100%; height: 18px; background: #222; }
    .bar        { height: 100%; background: var(--bar-set-color,    #7030A0); transition: width 0.2s; }
    .bar-total  { height: 100%; background: var(--bar-total-color,  #8000ff); transition: width 0.2s; }
    .bar-streak { height: 100%; background: var(--bar-streak-color, #375623); transition: width 0.2s; }

    td.set-cell { padding: 0; }

    input[type="number"] {
      width: 100%; height: 100%; box-sizing: border-box;
      background: transparent; color: white;
      border: none; font-size: 13px; text-align: center;
      outline: none; padding: 4px 0; -moz-appearance: textfield;
    }
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

    td select {
      background: transparent; color: white; border: none;
      font-size: 12px; width: 100%; padding: 4px 2px;
      outline: none; appearance: none; -webkit-appearance: none;
      cursor: pointer; text-align: center;
    }
    td select option { background: #111; color: white; }

    td textarea {
      width: 100%; height: 100%; min-height: 36px;
      box-sizing: border-box; background: transparent;
      color: white; border: none; font-size: 12px;
      resize: none; outline: none; padding: 4px;
      font-family: sans-serif;
    }

    .sentinel { height: 1px; }

    /* ── Confirmation overlay ── */
    #confirm-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.78); z-index: 9999;
      align-items: center; justify-content: center;
    }
    #confirm-overlay.active { display: flex; }
    #confirm-box {
      background: #1c1c1c; border: 1px solid #555;
      border-radius: 10px; padding: 28px 32px;
      max-width: 360px; width: 90%;
      display: flex; flex-direction: column; gap: 14px;
    }
    #confirm-box p { margin: 0; font-size: 14px; color: #ccc; line-height: 1.6; }
    #confirm-box strong { color: #fff; }
    #confirm-input {
      background: #000; border: 1px solid #555; border-radius: 4px;

    #confirm-input.shake { border-color: #cc0000; animation: shake 0.28s ease; }
    @keyframes shake {

    #confirm-hint { font-size: 12px; color: #cc4444; min-height: 15px; margin-top: -6px; }
    #confirm-cancel {

    #confirm-cancel:hover { background: #444; }
    /* ── Settings cog & panel ── */
    #settings-cog {
      width: 34px; height: 34px; border-radius: 50%;
      background: #2a2a2a; border: 1px solid #444;
      color: #999; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, color 0.2s; padding: 0; flex-shrink: 0;
    }
    #settings-cog:hover { background: #3a3a3a; color: #fff; }
    #settings-cog svg { width: 16px; height: 16px; fill: currentColor; }

    #top-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }
    .top-item {

      align-items: center;

    .top-item:active { cursor: grabbing; }

    .top-item[data-item="export-all"],
.top-item[data-item="import-all"],
.top-item[data-item="export-layout"],
.top-item[data-item="import-layout"],
.top-item[data-item="clear-all"],
.top-item[data-item="my-files"],
.top-item[data-item="hide-habits"],
.top-item[data-item="manage-habits"] { background: transparent !important; padding: 0 !important; }
    .top-item[data-item="export-all"] button    { background: var(--export-all-bg, #444); color: var(--export-all-fg, #fff); font-family: var(--export-all-font, sans-serif); width: 100%; height: 100%; border-radius: 6px; box-shadow: 0 0 16px 5px var(--export-all-glow, rgba(150,90,255,0.65)); }
.top-item[data-item="import-all"] button    { background: var(--import-all-bg, #444); color: var(--import-all-fg, #fff); font-family: var(--import-all-font, sans-serif); width: 100%; height: 100%; border-radius: 6px; box-shadow: 0 0 16px 5px var(--import-all-glow, rgba(150,90,255,0.65)); }
.top-item[data-item="export-layout"] button { background: var(--export-layout-bg, #444); color: var(--export-layout-fg, #fff); font-family: var(--export-layout-font, sans-serif); width: 100%; height: 100%; border-radius: 6px; box-shadow: 0 0 16px 5px var(--export-layout-glow, rgba(150,90,255,0.65)); }
.top-item[data-item="import-layout"] button { background: var(--import-layout-bg, #444); color: var(--import-layout-fg, #fff); font-family: var(--import-layout-font, sans-serif); width: 100%; height: 100%; border-radius: 6px; box-shadow: 0 0 16px 5px var(--import-layout-glow, rgba(150,90,255,0.65)); }
.top-item[data-item="clear-all"] button     { background: var(--clear-all-bg, #5a1a1a); color: var(--clear-all-fg, #ff9999); font-family: var(--clear-all-font, sans-serif); width: 100%; height: 100%; border-radius: 6px; box-shadow: 0 0 16px 5px var(--clear-all-glow, rgba(150,90,255,0.65)); }
.top-item[data-item="my-files"] button      { background: var(--my-files-bg, #444); color: var(--my-files-fg, #fff); font-family: var(--my-files-font, sans-serif); width: 100%; height: 100%; border-radius: 6px; box-shadow: 0 0 16px 5px var(--my-files-glow, rgba(150,90,255,0.65)); }
.top-item[data-item="manage-habits"] button { background: var(--manage-habits-bg, #444); color: var(--manage-habits-fg, #fff); font-family: var(--manage-habits-font, sans-serif); width: 100%; height: 100%; border-radius: 6px; box-shadow: 0 0 16px 5px var(--manage-habits-glow, rgba(150,90,255,0.65)); }
.top-item[data-item="hide-habits"] button   { background: var(--hide-habits-bg, #444); color: var(--hide-habits-fg, #fff); font-family: var(--hide-habits-font, sans-serif); width: 100%; height: 100%; border-radius: 6px; box-shadow: 0 0 16px 5px var(--hide-habits-glow, rgba(150,90,255,0.65)); }
    .top-item[data-item="export-all"] button.active { background: var(--export-all-active-bg, #555) !important; box-shadow: 0 0 16px 5px var(--export-all-glow, rgba(150,90,255,0.65)); }
    .top-item[data-item="title"],
    .top-item[data-item="version"],
    .top-item[data-item="date"],
    .top-item[data-item="time"],
    .top-item[data-item="settings"] { background: transparent; padding: 4px 8px; }
    .top-item[data-item="version"] { box-shadow: 0 0 16px 5px var(--btn-glow, rgba(150,90,255,0.65)); }
    .top-item[data-item="date"]    { box-shadow: 0 0 16px 5px var(--btn-glow, rgba(150,90,255,0.65)); }
    .top-item[data-item="time"]    { box-shadow: 0 0 16px 5px var(--btn-glow, rgba(150,90,255,0.65)); }
    .top-item button, .top-item span, .top-item label {
      background: transparent;
      color: inherit;
      border: none;
      font-size: inherit;
      font-family: inherit;
      cursor: inherit;
      padding: 0;
      margin: 0;
      pointer-events: none;
    }
    .top-item[data-item="manage-habits"] button {
    pointer-events: auto;
    }
    .top-item[data-item="settings"] button {
    pointer-events: auto;
    }
    .top-item input[type="file"] { display: none; }
    #settings-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.78); z-index: 9998;
      align-items: flex-start; justify-content: center;
      overflow-y: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    #settings-overlay::-webkit-scrollbar { display: none; }
    #settings-overlay.active { display: flex; }
    #settings-panel {
      background: #1c1c1c; border: 1px solid #555; border-radius: 10px;
      display: flex; flex-direction: column; gap: 16px;
      width: 100%; max-width: 100%; box-sizing: border-box;
      margin: 60px 0 60px 0; padding: 20px;
    }
    #settings-panel h2 { margin: 0; font-size: 15px; color: #fff; font-weight: 600; }
    .settings-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .settings-row label { font-size: 13px; color: #bbb; white-space: nowrap; }
    .settings-row input[type="color"] {
      width: 42px; height: 28px; border: 1px solid #555; border-radius: 4px;
      background: none; cursor: pointer; padding: 2px 3px;
    }
    .settings-row select {
      background: #111; color: white; border: 1px solid #555;
      padding: 5px 8px; font-size: 13px; border-radius: 4px; flex: 1; max-width: 180px;
    }
    #settings-btn-preview {
  display: none;
}
/* ── Coverflow ── */
#cf-outer { margin-bottom: 10px; }
#cf-label { text-align:center; font-size:13px; color:#ccc; font-weight:600; min-height:18px; margin-bottom:4px; }
#cf-stage { position:relative; width:100%; height:72px; perspective:1200px; overflow:hidden; cursor:pointer; }
#cf-track { position:relative; width:100%; height:100%; transform-style:preserve-3d; }
.cf-item {
  position:absolute; top:50%; transform-origin:center center;
  transition:transform 0.22s cubic-bezier(.25,0,.2,1), opacity 0.18s, box-shadow 0.22s;
  border-radius:6px; display:flex; align-items:center; justify-content:center;
  font-size:14px; padding:0 12px; height:46px; min-width:70px; max-width:150px;
  box-sizing:border-box; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  cursor:pointer; border:none; outline:none; user-select:none; -webkit-user-select:none;
}
#cf-arrows { display:flex; justify-content:center; gap:20px; margin-top:6px; }
.cf-arrow {
  background:#2a2a2a; border:1px solid #444; color:#aaa; border-radius:50%;
  width:26px; height:26px; display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:13px; flex-shrink:0; transition:background 0.15s; touch-action:manipulation;
}
.cf-arrow:hover { background:#3a3a3a; color:#fff; }

/* ── Coverflow button selector ── */
#coverflow-wrap {
  position: relative;
  width: 100%;
  height: 90px;
  perspective: 600px;
  overflow: hidden;
  margin-bottom: 8px;
  cursor: pointer;
}
#coverflow-track {
  position: relative;
  width: 100%;
  height: 100%;
  transform-style: preserve-3d;
}
.cf-item {
  position: absolute;
  top: 50%;
  transform-origin: center center;
  transform: translateY(-50%);
  transition: transform 0.35s cubic-bezier(.4,0,.2,1), opacity 0.35s;
  cursor: pointer;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 500;
  padding: 0 14px;
  height: 50px;
  min-width: 80px;
  max-width: 160px;
  box-sizing: border-box;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  user-select: none;
  -webkit-user-select: none;
  border: none;
  outline: none;
}
.cf-item.cf-active {
  box-shadow: 0 0 18px 5px var(--btn-glow, rgba(150,90,255,0.65));
  z-index: 10;
}
#coverflow-label {
  text-align: center;
  font-size: 12px;
  color: #888;
  margin-bottom: 4px;
  letter-spacing: 0.04em;
}
#coverflow-arrows {
  display: flex;
  justify-content: center;
  gap: 24px;
  margin-bottom: 10px;
}
.cf-arrow {
  background: #2a2a2a;
  border: 1px solid #444;
  color: #aaa;
  border-radius: 50%;
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 14px;
  flex-shrink: 0;
  transition: background 0.2s;
}
.cf-arrow:hover { background: #3a3a3a; color: #fff; }
    #settings-btn-preview.active {
      background: var(--preview-active-bg, #555) !important;
      box-shadow: 0 0 16px 5px var(--preview-glow, rgba(150, 90, 255, 0.65));
    }
    #settings-footer { display: flex; gap: 8px; margin-top: 4px; }
    #settings-save, #settings-cancel, #settings-reset, #settings-export, #settings-import-btn {
      padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px;
    }
    #settings-save   { background: #1a3a1a; color: #99ff99; }
    #settings-save:hover { background: #2a4a2a; }
    #settings-cancel { background: #333; color: #ccc; }
    #settings-cancel:hover { background: #444; }
    #settings-reset  { background: #2a1a1a; color: #ff9999; }
    #settings-reset:hover { background: #3a2020; }
    #settings-export, #settings-import-btn { background: #1a2a3a; color: #99ccff; }
    #settings-export:hover, #settings-import-btn:hover { background: #2a3a4a; }

input[type="checkbox"] {
  appearance: none;
  -webkit-appearance: none;
  margin: 0px;
  width: 18px;
  height: 18px;
  border: 2px solid var(--checkbox-border, #555555FF);
  border-radius: 4px;
  background: var(--checkbox-bg, #111111FF);
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s;
  position: relative;
}
input[type="checkbox"]:checked {
  background: var(--checkbox-checked, #90EE90FF);
  border-color: var(--checkbox-checked, #90EE90FF);
}
input[type="checkbox"]:checked::after {
  content: "✓";
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: var(--checkbox-mark, #000000FF);
  font-size: 12px;
  font-weight: bold;
  line-height: 1;
}
input[type="checkbox"]:hover {
  border-color: var(--checkbox-border-hover, #777777FF);
}
