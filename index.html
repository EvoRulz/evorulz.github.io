<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="theme-color" content="#000000">
  <link rel="stylesheet" href="app.css">

<body>

<!-- Shared confirmation overlay -->
<div id="confirm-overlay">
  <div id="confirm-box">
    <p id="confirm-msg"></p>
    <input id="confirm-input" type="text" placeholder="Habit Tracker"
           autocomplete="off" spellcheck="false">
    <div id="confirm-hint"></div>
    <button id="confirm-cancel" onclick="confirmCancel()">Cancel</button>
  </div>
</div>

<div id="top-grid">
  <div class="top-item" data-item="title"><span id="title-span" class="title-span flame-active" style="font-size:22px;font-weight:bold;color:white;pointer-events:auto" onclick="this.classList.toggle('flame-active')">Habit Tracker</span></div>
  <div class="top-item" data-item="version"><div style="display:flex;flex-direction:column;align-items:center;gap:2px;"><span id="app-version" style="font-size:14px;">v1163</span><span id="app-stats" style="font-size:9px;color:#555;line-height:1.4;text-align:center;"></span></div></div>
  <div class="top-item" data-item="date" style="background:var(--clock-date-bg,transparent)"><span id="live-date" style="font-size:var(--clock-date-size,13px);color:var(--clock-date-color,#666);letter-spacing:0.02em;cursor:pointer;line-height:1.3;text-align:center"></span></div>
  <div class="top-item" data-item="time" style="background:var(--clock-time-bg,transparent)"><span id="live-time" style="font-size:var(--clock-time-size,13px);color:var(--clock-time-color,#666);letter-spacing:0.02em;cursor:pointer"></span></div>
  <div class="top-item" data-item="settings">
    <button id="settings-cog" onclick="settingsOpen()" title="Button style settings">
      <svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M8.325 2.317a1.75 1.75 0 0 1 3.35 0l.07.254a1.75 1.75 0 0 0 2.494 1.08l.235-.127a1.75 1.75 0 0 1 2.369 2.369l-.127.235a1.75 1.75 0 0 0 1.08 2.494l.254.07a1.75 1.75 0 0 1 0 3.35l-.254.07a1.75 1.75 0 0 0-1.08 2.494l.127.235a1.75 1.75 0 0 1-2.369 2.369l-.235-.127a1.75 1.75 0 0 0-2.494 1.08l-.07.254a1.75 1.75 0 0 1-3.35 0l-.07-.254a1.75 1.75 0 0 0-2.494-1.08l-.235.127a1.75 1.75 0 0 1-2.369-2.369l.127-.235a1.75 1.75 0 0 0-1.08-2.494l-.254-.07a1.75 1.75 0 0 1 0-3.35l.254-.07a1.75 1.75 0 0 0 1.08-2.494l-.127-.235a1.75 1.75 0 0 1 2.369-2.369l.235.127a1.75 1.75 0 0 0 2.494-1.08l.07-.254ZM10 13a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/></svg>
    </button>
  </div>
  <div class="top-item" data-item="export-all"><button class="app-btn" onclick="appExport()" onpointerdown="this.classList.add('active')" onpointerup="this.classList.remove('active')" onpointerleave="this.classList.remove('active')">Export All</button></div>
  <div class="top-item" data-item="import-all">
    <button class="app-btn" onclick="document.getElementById('app-import-file').click()">Import All</button>
    <input type="file" id="app-import-file" accept=".json" style="display:none" onchange="appImport(this)">
  </div>
  <div class="top-item" data-item="export-layout"><button class="app-btn" onclick="exportLayout()">Export Layout</button></div>
  <div class="top-item" data-item="import-layout">
    <button class="app-btn" onclick="document.getElementById('layout-import-file').click()">Import Layout</button>
    <input type="file" id="layout-import-file" accept=".json" style="display:none" onchange="importLayout(this)">
  </div>
  <div class="top-item" data-item="clear-all"><button class="app-btn btn-clear-all" onclick="appClear()">Clear All</button></div>
  <div class="top-item" data-item="my-files"><button class="app-btn" onclick="openMyFiles()">My Files</button></div>
  <div class="top-item" data-item="hide-habits"><button class="app-btn" id="hide-habits-btn" onclick="toggleHabits()">Hide Habits</button></div>
  <div class="top-item" data-item="manage-habits"><button class="app-btn" onclick="manageOpen()">Manage Habits</button></div>
  <div class="top-item" data-item="orient-lock">
    <button id="orient-lock-btn" onclick="toggleOrientLock()" title="Lock screen orientation">
      <svg id="orient-lock-icon" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"></svg>
    </button>
  </div>
</div>
<div id="buttons"></div>
<div id="sections"></div>
<!-- Manage Habits overlay -->
<div id="manage-overlay">
  <div id="manage-panel">
    <h2>Manage Habits</h2>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:-2px">
      <input type="checkbox" id="manage-select-all" onchange="manageToggleSelectAll()">
      <label for="manage-select-all" style="flex:1;background:#111;color:#bbb;border-radius:4px;padding:6px 10px;font-size:13px;outline:none;margin:0">Select All</label>
      <div style="width:60px"></div>
      <div style="width:60px"></div>
    </div>
    <div id="manage-list"></div>
    <div id="manage-add-row">
      <input id="manage-new-name" type="text" placeholder="New habit name…" autocomplete="off" spellcheck="false" onkeydown="if(event.key==='Enter') manageAddHabit()">
      <button id="manage-add-btn" onclick="manageAddHabit()">Add</button>
    </div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button id="manage-delete-selected" style="background:#3a2020;color:#ff9999;padding:8px 16px;border:none;border-radius:4px;cursor:pointer;font-size:13px;display:none" onclick="manageBulkDelete()">Delete Selected</button>
      <button id="manage-close-btn" onclick="manageClose()">Done</button>
    </div>
  </div>
</div>
<!-- Settings overlay -->

      <div class="settings-group-item" data-group="sg-app">App</div>

      <div class="settings-group-item" data-group="sg-swatches">Swatches</div>
    </div>

          <input type="text" class="hex-input" id="s-glow-hex" maxlength="9" oninput="onHexInput('s-glow')" spellcheck="false" autocomplete="off">

      </div>
      <div class="color-settings-row" data-btn-row="activebg">
        <label>Active background</label>
        <div class="color-picker-row">
          <input type="color" id="s-activebg" oninput="onColorPickerChange('s-activebg')">
          <input type="range" class="alpha-slider" id="s-activebg-alpha" min="0" max="255" value="255" oninput="onAlphaChange('s-activebg')">
        </div>
        <div class="hex-copy-row">
          <input type="text" class="hex-input" id="s-activebg-hex" maxlength="9" oninput="onHexInput('s-activebg')" spellcheck="false" autocomplete="off">

          <input type="text" class="hex-input" id="s-tap-hex" maxlength="9" oninput="onHexInput('s-tap')" spellcheck="false" autocomplete="off">
          <button class="copy-btn" onclick="copyHex('s-tap',this)">Copy</button>
        </div>
      </div>
      <div class="settings-row" data-btn-row="radius">
        <label>Corner radius <span id="s-radius-val">6px</span></label>
        <input type="range" class="alpha-slider" id="s-radius" min="0" max="50" value="6" oninput="document.getElementById('s-radius-val').textContent=this.value+'px';settingsChange()">
      </div>
        <div class="settings-row" data-btn-row="font">

          <option value="'Comfortaa', sans-serif">Comfortaa</option>
          <option value="'Philosopher', sans-serif">Philosopher</option>
          <option value="'Libre Franklin', sans-serif">Libre Franklin</option>
          <option value="'Noto Serif', serif">Noto Serif</option>
          <option value="'Merriweather', serif">Merriweather</option>
          <option value="'Playfair Display', serif">Playfair Display</option>
          <option value="'Lora', serif">Lora</option>
          <option value="'EB Garamond', serif">EB Garamond</option>
          <option value="'Libre Baskerville', serif">Libre Baskerville</option>
          <option value="'Roboto Slab', serif">Roboto Slab</option>

          <div style="display:flex;flex-direction:column;gap:3px;align-items:center;">
            <label style="font-size:10px;color:#666;">Years</label>
            <input id="notif-years" type="number" min="0" value="0" style="width:100%;background:#111;color:#fff;border:1px solid #444;border-radius:4px;padding:4px;font-size:13px;text-align:center;box-sizing:border-box;">
          </div>
          <div style="display:flex;flex-direction:column;gap:3px;align-items:center;">
            <label style="font-size:10px;color:#666;">Days</label>
            <input id="notif-days" type="number" min="0" value="0" style="width:100%;background:#111;color:#fff;border:1px solid #444;border-radius:4px;padding:4px;font-size:13px;text-align:center;box-sizing:border-box;">
          </div>
          <div style="display:flex;flex-direction:column;gap:3px;align-items:center;">
            <label style="font-size:10px;color:#666;">Hours</label>
            <input id="notif-hours" type="number" min="0" value="1" style="width:100%;background:#111;color:#fff;border:1px solid #444;border-radius:4px;padding:4px;font-size:13px;text-align:center;box-sizing:border-box;">
          </div>
          <div style="display:flex;flex-direction:column;gap:3px;align-items:center;">
            <label style="font-size:10px;color:#666;">Mins</label>
            <input id="notif-minutes" type="number" min="0" value="0" style="width:100%;background:#111;color:#fff;border:1px solid #444;border-radius:4px;padding:4px;font-size:13px;text-align:center;box-sizing:border-box;">
          </div>
          <div style="display:flex;flex-direction:column;gap:3px;align-items:center;">
            <label style="font-size:10px;color:#666;">Secs</label>
            <input id="notif-seconds" type="number" min="0" value="0" style="width:100%;background:#111;color:#fff;border:1px solid #444;border-radius:4px;padding:4px;font-size:13px;text-align:center;box-sizing:border-box;">
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:3px;">
          <label style="font-size:13px;color:#bbb;">Target reps to stop notifying (0 = ignore)</label>
          <input id="notif-target-reps" type="number" min="0" value="0" style="width:80px;background:#111;color:#fff;border:1px solid #444;border-radius:4px;padding:4px 8px;font-size:13px;text-align:center;">
        </div>
        <button id="notif-save-schedule-btn" onclick="notifSaveSchedule()" style="padding:7px 16px;background:#1a3a1a;color:#99ff99;border:none;border-radius:4px;cursor:pointer;font-size:13px;align-self:flex-start;">Save Schedule</button>
      </div>
    </div>
    <div class="settings-group-content" id="sg-coverflow" style="display:none">
      <div class="settings-row">
        <label>Step spread <span id="cf-step-tx-val"></span></label>
        <input type="range" class="alpha-slider" id="cf-step-tx" min="10" max="100" oninput="cfApplyTuning()">
      </div>
      <div class="settings-row">
        <label>Max angle <span id="cf-max-angle-val"></span></label>
        <input type="range" class="alpha-slider" id="cf-max-angle" min="0" max="89" oninput="cfApplyTuning()">
      </div>
      <div class="settings-row">
        <label>Scale falloff <span id="cf-scale-val"></span></label>
        <input type="range" class="alpha-slider" id="cf-scale" min="0" max="100" oninput="cfApplyTuning()">
      </div>
      <div class="settings-row">
        <label>Opacity falloff <span id="cf-opacity-val"></span></label>
        <input type="range" class="alpha-slider" id="cf-opacity" min="0" max="100" oninput="cfApplyTuning()">
      </div>
      <div class="settings-row">
        <label>Animation speed <span id="cf-duration-val"></span></label>
        <input type="range" class="alpha-slider" id="cf-duration" min="50" max="800" oninput="cfApplyTuning()">
      </div>
      <div class="settings-row">
        <label>Card width <span id="cf-card-w-val"></span></label>
        <input type="range" class="alpha-slider" id="cf-card-w" min="10" max="80" oninput="cfApplyTuning()">
      </div>
      <div class="settings-row">
        <label>Corner radius <span id="cf-shape-val">6px</span></label>
        <input type="range" class="alpha-slider" id="cf-shape" min="0" max="50" value="6" oninput="document.getElementById('cf-shape-val').textContent=this.value+'px';cfApplyTuning()">
      </div>
    </div>
    <div class="settings-group-content" id="sg-swatches">
      <div class="color-settings-row" data-swatch-row="cp-bg">
        <label>Popup background</label>
        <div class="color-picker-row">
          <input type="color" id="s-cp-bg" oninput="onColorPickerChange('s-cp-bg')">
          <input type="range" class="alpha-slider" id="s-cp-bg-alpha" min="0" max="255" value="255" oninput="onAlphaChange('s-cp-bg')">
        </div>
        <div class="hex-copy-row">
          <input type="text" class="hex-input" id="s-cp-bg-hex" maxlength="9" oninput="onHexInput('s-cp-bg')" spellcheck="false" autocomplete="off">
          <button class="copy-btn" onclick="copyHex('s-cp-bg',this)">Copy</button>
        </div>
      </div>
      <div class="color-settings-row" data-swatch-row="cp-border">
        <label>Popup border</label>
        <div class="color-picker-row">
          <input type="color" id="s-cp-border" oninput="onColorPickerChange('s-cp-border')">
          <input type="range" class="alpha-slider" id="s-cp-border-alpha" min="0" max="255" value="255" oninput="onAlphaChange('s-cp-border')">
        </div>
        <div class="hex-copy-row">
          <input type="text" class="hex-input" id="s-cp-border-hex" maxlength="9" oninput="onHexInput('s-cp-border')" spellcheck="false" autocomplete="off">
          <button class="copy-btn" onclick="copyHex('s-cp-border',this)">Copy</button>
        </div>
      </div>
      <div class="color-settings-row" data-swatch-row="cp-text">
        <label>Popup text colour</label>
        <div class="color-picker-row">
          <input type="color" id="s-cp-text" oninput="onColorPickerChange('s-cp-text')">
          <input type="range" class="alpha-slider" id="s-cp-text-alpha" min="0" max="255" value="255" oninput="onAlphaChange('s-cp-text')">
        </div>
        <div class="hex-copy-row">
          <input type="text" class="hex-input" id="s-cp-text-hex" maxlength="9" oninput="onHexInput('s-cp-text')" spellcheck="false" autocomplete="off">
          <button class="copy-btn" onclick="copyHex('s-cp-text',this)">Copy</button>
        </div>
      </div>
      <div class="color-settings-row" data-swatch-row="cp-label">
        <label>Label colour</label>
        <div class="color-picker-row">
          <input type="color" id="s-cp-label" oninput="onColorPickerChange('s-cp-label')">
          <input type="range" class="alpha-slider" id="s-cp-label-alpha" min="0" max="255" value="255" oninput="onAlphaChange('s-cp-label')">
        </div>
        <div class="hex-copy-row">
          <input type="text" class="hex-input" id="s-cp-label-hex" maxlength="9" oninput="onHexInput('s-cp-label')" spellcheck="false" autocomplete="off">
          <button class="copy-btn" onclick="copyHex('s-cp-label',this)">Copy</button>
        </div>
      </div>
      <div class="color-settings-row" data-swatch-row="cp-label-border">
        <label>Label outline colour</label>
        <div class="color-picker-row">
          <input type="color" id="s-cp-label-border" oninput="onColorPickerChange('s-cp-label-border')">
          <input type="range" class="alpha-slider" id="s-cp-label-border-alpha" min="0" max="255" value="0" oninput="onAlphaChange('s-cp-label-border')">
        </div>
        <div class="hex-copy-row">
          <input type="text" class="hex-input" id="s-cp-label-border-hex" maxlength="9" oninput="onHexInput('s-cp-label-border')" spellcheck="false" autocomplete="off">
          <button class="copy-btn" onclick="copyHex('s-cp-label-border',this)">Copy</button>
        </div>
      </div>
    </div>
    <div id="settings-footer">
      <button id="settings-save" onclick="settingsSave()">Save</button>
      <button id="settings-undo" onclick="settingsUndo()" disabled>Undo</button>
      <button id="settings-redo" onclick="settingsRedo()" disabled>Redo</button>
      <button id="settings-cancel" onclick="settingsCancel()">Close</button>
      <button id="settings-reset" onclick="settingsReset()">Default</button>
    </div>
    <div id="settings-footer">
      <button id="settings-export" onclick="settingsExport()">Export</button>
      <button id="settings-import-btn" onclick="document.getElementById('settings-import-file').click()">Import</button>
      <input type="file" id="settings-import-file" accept=".json" style="display:none" onchange="settingsImport(this)">
    </div>
  </div>
</div>
<div id="ctrl-bar">
  <span class="ctrl-label">Drag</span>
  <div class="ctrl-toggle on" id="drag-toggle" onclick="ctrlToggleDrag()"><div class="ctrl-knob"></div></div>
  <div class="ctrl-divider"></div>
  <div class="ctrl-toggle on" id="interact-toggle" onclick="ctrlToggleInteract()"><div class="ctrl-knob"></div></div>
  <span class="ctrl-label">Controls</span>
</div>
<script src="utils.js"></script>
<script src="tracker.js"></script>
<script src="bootstrap.js"></script>
<script src="styles-core.js"></script>
<script src="styles-colors.js"></script>
<script src="settings-panel.js"></script>
<script src="settings-change.js"></script>
<script src="styles-drag-rows.js"></script>
<script src="drag.js"></script>
<script src="app-data.js"></script>
<script src="clock.js"></script>
<script src="coverflow.js"></script>
<script src="manage.js"></script>
<script src="tumbler.js"></script>
<script src="font.js"></script>
<script src="notifications.js"></script>
<script src="slider-init.js"></script>
<script src="color-picker.js"></script>
</body>
</html>
