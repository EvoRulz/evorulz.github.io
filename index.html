<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coverflow Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #111; color: #fff; font-family: sans-serif; padding: 20px; }

    .cf-item {
      position: absolute;
      top: 50%;
      transform-origin: center center;
      transform: translateY(-50%);
      transition: transform 0.35s cubic-bezier(.4,0,.2,1), opacity 0.35s;
      cursor: pointer;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 500;
      padding: 0 14px;
      height: 50px;
      min-width: 80px;
      max-width: 160px;
      box-sizing: border-box;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      user-select: none;
      -webkit-user-select: none;
      border: none;
      outline: none;
    }

    #cf-label {
      text-align: center;
      font-size: 13px;
      color: #aaa;
      margin-bottom: 6px;
      min-height: 18px;
    }

    #cf-stage {
      position: relative;
      width: 100%;
      height: 80px;
      perspective: 1200px;
      overflow: hidden;
      cursor: pointer;
      background: #1a1a1a;
      border-radius: 8px;
      border: 1px solid #333;
    }

    .section { margin-bottom: 24px; }
    .section h2 { font-size: 13px; color: #888; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 6px; }

    .row { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
    .row label { font-size: 13px; color: #bbb; white-space: nowrap; }

    .row input[type="range"] { flex: 1; }
    .row .val { font-size: 12px; color: #888; min-width: 40px; text-align: right; font-family: monospace; }

    .color-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
    .color-row label { font-size: 13px; color: #bbb; }
    .color-picker-row { display: flex; align-items: center; gap: 8px; }
    .alpha-slider { flex: 1; height: 8px; border-radius: 4px; cursor: pointer; border: 1px solid #555; outline: none; }
    .hex-row { display: flex; align-items: center; gap: 6px; }
    .hex-input { flex: 1; background: #111; color: #fff; border: 1px solid #555; border-radius: 4px; padding: 4px 8px; font-size: 12px; font-family: monospace; outline: none; text-transform: uppercase; }
    .copy-btn { background: #2a2a2a; border: 1px solid #555; border-radius: 4px; color: #aaa; cursor: pointer; padding: 4px 10px; font-size: 12px; }
    .copy-btn:hover { background: #3a3a3a; color: #fff; }

    select { background: #111; color: #fff; border: 1px solid #555; padding: 5px 8px; font-size: 13px; border-radius: 4px; flex: 1; max-width: 180px; }

    .items-list { display: flex; flex-direction: column; gap: 6px; }
    .item-row { display: flex; gap: 6px; align-items: center; }
    .item-row input[type="text"] { flex: 1; background: #111; color: #fff; border: 1px solid #555; border-radius: 4px; padding: 5px 8px; font-size: 13px; outline: none; }
    .item-row button { padding: 5px 10px; background: #2a2a2a; color: #aaa; border: 1px solid #555; border-radius: 4px; cursor: pointer; font-size: 12px; }
    .item-row button:hover { background: #3a3a3a; color: #fff; }
    .item-row button.del { color: #ff9999; }
    #add-item-row { display: flex; gap: 6px; margin-top: 8px; }
    #add-item-row input { flex: 1; background: #111; color: #fff; border: 1px solid #555; border-radius: 4px; padding: 5px 8px; font-size: 13px; outline: none; }
    #add-item-row button { padding: 5px 12px; background: #1a3a1a; color: #99ff99; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }

    .debug-box { background: #1a1a1a; border: 1px solid #333; border-radius: 6px; padding: 12px; font-size: 11px; font-family: monospace; color: #888; white-space: pre-wrap; word-break: break-all; max-height: 120px; overflow-y: auto; }
  </style>
</head>
<body>
  <div style="text-align:right;font-size:13px;margin-bottom:16px;">
  <span id="app-version">v25</span>
</div>

<div class="section">
  <h2>Coverflow Preview</h2>
  <div id="cf-label"></div>
  <div id="cf-stage"></div>
</div>

<div class="section">
  <h2>Active card colour</h2>
  <div class="color-row">
    <label>Background</label>
    <div class="color-picker-row">
      <input type="color" id="s-bg" value="#444444" oninput="syncColors()">
      <input type="range" class="alpha-slider" id="s-bg-alpha" min="0" max="255" value="255" oninput="syncColors()">
    </div>
    <div class="hex-row">
      <input type="text" class="hex-input" id="s-bg-hex" maxlength="9" oninput="onHexInput('s-bg')" value="#444444FF">
      <button class="copy-btn" onclick="copyHex('s-bg', this)">Copy</button>
    </div>
  </div>
  <div class="color-row">
    <label>Text</label>
    <div class="color-picker-row">
      <input type="color" id="s-fg" value="#ffffff" oninput="syncColors()">
      <input type="range" class="alpha-slider" id="s-fg-alpha" min="0" max="255" value="255" oninput="syncColors()">
    </div>
    <div class="hex-row">
      <input type="text" class="hex-input" id="s-fg-hex" maxlength="9" oninput="onHexInput('s-fg')" value="#FFFFFFFF">
      <button class="copy-btn" onclick="copyHex('s-fg', this)">Copy</button>
    </div>
  </div>
  <div class="color-row">
    <label>Glow</label>
    <div class="color-picker-row">
      <input type="color" id="s-glow" value="#9659ff" oninput="syncColors()">
      <input type="range" class="alpha-slider" id="s-glow-alpha" min="0" max="255" value="255" oninput="syncColors()">
    </div>
    <div class="hex-row">
      <input type="text" class="hex-input" id="s-glow-hex" maxlength="9" oninput="onHexInput('s-glow')" value="#9659FFFF">
      <button class="copy-btn" onclick="copyHex('s-glow', this)">Copy</button>
    </div>
  </div>
  <div class="row">
    <label>Font</label>
    <select id="s-font" onchange="syncColors()">
      <option value="sans-serif" selected>Sans-serif</option>
      <option value="serif">Serif</option>
      <option value="monospace">Monospace</option>
      <option value="cursive">Cursive</option>
      <option value="fantasy">Fantasy</option>
    </select>
  </div>
  <div id="active-card-hint" style="font-size:11px;color:#555;margin-top:8px;letter-spacing:0.05em;text-transform:uppercase;">Regular card</div>
</div>

<div class="section">
  <h2>Items</h2>
  <div class="items-list" id="items-list"></div>
  <div id="add-item-row">
    <input type="text" id="new-item-text" placeholder="New item label...">
    <button onclick="addItem()">Add</button>
  </div>
</div>

<div class="section">
  <h2>Layout</h2>
  <div class="row">
    <label>Step translate (spread)</label>
    <input type="range" id="cf-step-tx" min="1" max="100" value="55" oninput="syncTuning()">
    <span class="val" id="cf-step-tx-val">55%</span>
  </div>
  <div class="row">
    <label>Card width</label>
    <input type="range" id="cf-card-w" min="10" max="80" value="36" oninput="syncTuning()">
    <span class="val" id="cf-card-w-val">36%</span>
  </div>
</div>

<div class="section">
  <h2>Rotation and depth</h2>
  <div class="row">
    <label>Max rotation angle</label>
    <input type="range" id="cf-max-angle" min="0" max="89" value="89" oninput="syncTuning()">
    <span class="val" id="cf-max-angle-val">89 deg</span>
  </div>
  <div class="row">
    <label>Scale falloff</label>
    <input type="range" id="cf-scale" min="0" max="50" value="5" oninput="syncTuning()">
    <span class="val" id="cf-scale-val">0.05</span>
  </div>
  <div class="row">
    <label>Opacity falloff</label>
    <input type="range" id="cf-opacity" min="0" max="50" value="10" oninput="syncTuning()">
    <span class="val" id="cf-opacity-val">0.10</span>
  </div>
</div>

<div class="section">
  <h2>Animation</h2>
  <div class="row">
    <label>Spring duration (ms)</label>
    <input type="range" id="cf-duration" min="5" max="500" value="20" oninput="syncTuning()">
    <span class="val" id="cf-duration-val">20</span>
  </div>
</div>

<div class="section">
  <h2>Debug state</h2>
  <div class="debug-box" id="debug-box">-</div>
</div>

<script>
  // ── State ──────────────────────────────────────────────────
  let items = [
    { id: "export-all",    label: "Export All" },
    { id: "import-all",    label: "Import All" },
    { id: "clear-all",     label: "Clear All" },
    { id: "my-files",      label: "My Files" },
    { id: "pushups",       label: "Pushups" },
    { id: "teeth",         label: "Teeth" },
    { id: "appdev",        label: "App Dev" },
  ];

  const tuning = { stepTx: 0.55, maxAngle: 89, scaleFalloff: 0.05, opacityFalloff: 0.10, duration: 20, cardW: 0.36 };
  const globalFont = { value: "sans-serif" };
  const itemStyles = {};
  const toggleHideStyle = { bg: "#3A1A1AFF", fg: "#FF9999FF", glow: "#FF6464FF" };
  const toggleShowStyle = { bg: "#1A3A1AFF", fg: "#99FF99FF", glow: "#64FF64FF" };

  function getStyleForItem(item) {
    if (!item) return { bg: "#444444FF", fg: "#FFFFFFFF", glow: "#9659FFFF" };
    if (item.isToggle) return hideHabits ? toggleShowStyle : toggleHideStyle;
    if (!itemStyles[item.id]) itemStyles[item.id] = { bg: "#444444FF", fg: "#FFFFFFFF", glow: "#9659FFFF" };
    return itemStyles[item.id];
  }

  function getCenteredItem() {
    const displayItems = getDisplayItems();
    return displayItems[Math.round(cfIdx)] || null;
  }

  let cfIdx = 0;
  let animId = null;
  let displayIdx = 0;
  let hideHabits = false;

  // ── Colour helpers ─────────────────────────────────────────
  function hex8ToComponents(hex) {
    const h = hex.replace("#", "");
    const r = parseInt(h.slice(0,2), 16) || 0;
    const g = parseInt(h.slice(2,4), 16) || 0;
    const b = parseInt(h.slice(4,6), 16) || 0;
    const a = h.length === 8 ? parseInt(h.slice(6,8), 16) : 255;
    return { r, g, b, a };
  }
  function componentsToHex8({ r, g, b, a }) {
    return "#" + [r,g,b,a].map(v => Math.round(v).toString(16).padStart(2,"0").toUpperCase()).join("");
  }
  function hex8ToCss(hex) {
    const { r, g, b, a } = hex8ToComponents(hex);
    return `rgba(${r},${g},${b},${(a/255).toFixed(3)})`;
  }
  function getColorValue(id) {
    const picker = document.getElementById(id);
    const alpha = document.getElementById(id + "-alpha");
    if (!picker) return "#444444FF";
    const h = picker.value.replace("#","").toUpperCase();
    const a = alpha ? parseInt(alpha.value).toString(16).padStart(2,"0").toUpperCase() : "FF";
    return "#" + h + a;
  }
  function setColorValue(id, hex) {
    const { r, g, b, a } = hex8ToComponents(hex);
    const picker = document.getElementById(id);
    const slider = document.getElementById(id + "-alpha");
    const hexEl = document.getElementById(id + "-hex");
    if (picker) picker.value = "#" + [r,g,b].map(v => v.toString(16).padStart(2,"0")).join("");
    if (slider) { slider.value = a; updateAlphaSliderBg(id); }
    if (hexEl)  hexEl.value = componentsToHex8({ r, g, b, a });
  }
  function updateAlphaSliderBg(id) {
    const picker = document.getElementById(id);
    const slider = document.getElementById(id + "-alpha");
    if (!picker || !slider) return;
    slider.style.background = `linear-gradient(to right, transparent, ${picker.value})`;
  }
  function onHexInput(id) {
    const hexEl = document.getElementById(id + "-hex");
    let val = hexEl.value.trim();
    if (!val.startsWith("#")) val = "#" + val;
    const h = val.replace("#","");
    if ((h.length === 6 || h.length === 8) && /^[0-9a-fA-F]+$/.test(h)) {
      const { r, g, b, a } = hex8ToComponents(h.length === 6 ? "#" + h + "FF" : "#" + h);
      const picker = document.getElementById(id);
      const slider = document.getElementById(id + "-alpha");
      if (picker) picker.value = "#" + [r,g,b].map(v => v.toString(16).padStart(2,"0")).join("");
      if (slider) { slider.value = a; updateAlphaSliderBg(id); }
      syncColors();
    }
  }
  function copyHex(id, btn) {
    const val = getColorValue(id);
    navigator.clipboard.writeText(val).then(() => {
      btn.textContent = "Copied";
      setTimeout(() => btn.textContent = "Copy", 1200);
    }).catch(() => {});
  }

  // ── Sync handlers ──────────────────────────────────────────
  function syncTuning() {
    tuning.stepTx = Number(document.getElementById("cf-step-tx").value) / 100;
    tuning.maxAngle = Number(document.getElementById("cf-max-angle").value);
    tuning.scaleFalloff = Number(document.getElementById("cf-scale").value) / 100;
    tuning.opacityFalloff = Number(document.getElementById("cf-opacity").value) / 100;
    tuning.duration = Number(document.getElementById("cf-duration").value);
    tuning.cardW = Number(document.getElementById("cf-card-w").value) / 100;

    document.getElementById("cf-step-tx-val").textContent = tuning.stepTx.toFixed(2) * 100 + "%";
    document.getElementById("cf-max-angle-val").textContent = tuning.maxAngle + " deg";
    document.getElementById("cf-scale-val").textContent = tuning.scaleFalloff.toFixed(2);
    document.getElementById("cf-opacity-val").textContent = tuning.opacityFalloff.toFixed(2);
    document.getElementById("cf-duration-val").textContent = tuning.duration;
    document.getElementById("cf-card-w-val").textContent = tuning.cardW.toFixed(2) * 100 + "%";

    cfBuild();
    updateDebug();
  }
  function syncColors() {
    const item = getCenteredItem();
    const cs = getStyleForItem(item);
    cs.bg   = getColorValue("s-bg");
    cs.fg   = getColorValue("s-fg");
    cs.glow = getColorValue("s-glow");
    globalFont.value = document.getElementById("s-font").value;
    updateAlphaSliderBg("s-bg");
    updateAlphaSliderBg("s-fg");
    updateAlphaSliderBg("s-glow");
    cfRender();
    updateDebug();
  }
  // ── Items list UI ──────────────────────────────────────────
  function renderItemsList() {
    const list = document.getElementById("items-list");
    list.innerHTML = "";
    items.forEach((item, i) => {
      const row = document.createElement("div");
      row.className = "item-row";
      row.innerHTML = `
        <input type="text" value="${item.label}" oninput="renameItem(${i}, this.value)">
        <button onclick="moveItem(${i}, -1)">Up</button>
        <button onclick="moveItem(${i}, 1)">Down</button>
        <button class="del" onclick="removeItem(${i})">Del</button>`;
      list.appendChild(row);
    });
  }
  function addItem() {
    const inp = document.getElementById("new-item-text");
    const label = inp.value.trim();
    if (!label) return;
    items.push({ id: "item_" + Date.now(), label });
    inp.value = "";
    renderItemsList();
    cfBuild();
  }
  function removeItem(i) {
    items.splice(i, 1);
    if (cfIdx >= items.length) cfIdx = Math.max(0, items.length - 1);
    renderItemsList();
    cfBuild();
  }
  function renameItem(i, val) {
    items[i].label = val;
    cfRender();
  }
  function moveItem(i, dir) {
    const j = i + dir;
    if (j < 0 || j >= items.length) return;
    [items[i], items[j]] = [items[j], items[i]];
    renderItemsList();
    cfBuild();
  }

  // ── Debug ──────────────────────────────────────────────────
  function updateDebug() {
    document.getElementById("debug-box").textContent =
      "active index: " + cfIdx + " / " + (items.length - 1) +
      "\nactive label: " + (items[cfIdx]?.label || "-") +
      "\ntuning: " + JSON.stringify(tuning, null, 2) +
      "\nitemStyles: " + JSON.stringify(itemStyles, null, 2);
  }

  // ── Toggle button injection ────────────────────────────────
  function getDisplayItems() {
    const mid = Math.floor(items.length / 2);
    const toggleItem = {
      id: "__toggle_habits__",
      label: hideHabits ? "Show Habits" : "Hide Habits",
      isToggle: true
    };
    if (hideHabits) {
      return [toggleItem];
    }
    return [...items.slice(0, mid), toggleItem, ...items.slice(mid)];
  }
  // ── Coverflow ──────────────────────────────────────────────
  function cfKeyframe(d) {
    const sign = d < 0 ? -1 : 1;
    const abs = Math.abs(d);
    const ry = -sign * Math.min((abs > 1 ? abs * 72 : abs * 42), tuning.maxAngle);
    const sc = Math.max(0.80, 1 - Math.min(abs, 1) * tuning.scaleFalloff * 0.5 - Math.max(0, abs - 1) * tuning.scaleFalloff * 0.1);
    const op = Math.max(0.15, 1 - abs * tuning.opacityFalloff) * (abs > 2.5 ? Math.max(0.4, 1 - (abs - 2.5) * 0.25) : 1);
    const zi = Math.max(1, 20 - Math.floor(abs * 2));
    const W = document.getElementById("cf-stage").offsetWidth || 300;
    const tx = W / 2 + sign * (1 - Math.exp(-abs * 0.9)) * (W * 0.46) - (Math.min(150, Math.max(70, Math.floor(W * tuning.cardW)))) * 0.5;
    return { tx, ry, sc, op, zi };
  }
  function cfInterp(a, b, t) {
    return {
      tx: a.tx + (b.tx - a.tx) * t,
      ry: a.ry + (b.ry - a.ry) * t,
      sc: a.sc + (b.sc - a.sc) * t,
      op: a.op + (b.op - a.op) * t,
      zi: Math.round(a.zi + (b.zi - a.zi) * t),
    };
  }

  function cfRender() {
    const stage = document.getElementById("cf-stage");
    const label = document.getElementById("cf-label");
    if (!stage) return;
    const displayItems = getDisplayItems();
    const els = [...stage.querySelectorAll(".cf-item")];
    if (els.length !== displayItems.length) { cfBuild(); return; }
    const W = stage.offsetWidth || 300;
    const iW = Math.min(150, Math.max(70, Math.floor(W * tuning.cardW)));

    els.forEach((el, i) => {
      const item = displayItems[i];
      const d = i - cfIdx;
      const d0 = Math.floor(d), d1 = Math.ceil(d);
      const t = d - d0;
      const kf = t === 0 ? cfKeyframe(d0) : cfInterp(cfKeyframe(d0), cfKeyframe(d1), t);
      const isCenter = Math.abs(d) < 0.5;
      const cs = getStyleForItem(item);
      el.style.background  = hex8ToCss(cs.bg);
      el.style.color       = hex8ToCss(cs.fg);
      el.style.fontFamily  = globalFont.value;
      el.style.left        = kf.tx + "px";
      el.style.transform   = `translateY(-50%) rotateY(${kf.ry}deg) scale(${kf.sc})`;
      el.style.opacity     = kf.op;
      el.style.zIndex      = kf.zi;
      el.style.width       = iW + "px";
      el.style.boxShadow   = isCenter ? `0 0 22px 6px ${hex8ToCss(cs.glow)}` : "none";
    });
  }

  function cfBuild() {
    const existingStage = document.getElementById("cf-stage");
    if (!existingStage) return;
    if (animId) { cancelAnimationFrame(animId); animId = null; }
    const stage = existingStage.cloneNode(false);
    existingStage.parentNode.replaceChild(stage, existingStage);
    displayIdx = cfIdx;
    stage.innerHTML = "";
    if (!items.length) return;
    const W = stage.offsetWidth || 300;
    const iW = Math.min(150, Math.max(70, Math.floor(W * tuning.cardW)));
    const displayItems = getDisplayItems();
    displayItems.forEach((item, i) => {
      const el = document.createElement("button");
      el.className = "cf-item";
      el.dataset.cfI = i;
      el.textContent = item.label;
      el.style.width = iW + "px";
      el.style.pointerEvents = "auto";
      stage.appendChild(el);
    });

    let dragStartX = null;
    let dragStartIdx = null;
    let didDrag = false;

    function springTo(target) {
      if (animId) cancelAnimationFrame(animId);
      const startIdx = displayIdx;
      const startTime = performance.now();
      const duration = tuning.duration;
      function step(now) {
        const t = Math.min((now - startTime) / duration, 1);
        const ease = 1 - Math.pow(1 - t, 3);
        displayIdx = startIdx + (target - startIdx) * ease;
        cfRenderAt(displayIdx);
        if (t < 1) {
          animId = requestAnimationFrame(step);
        } else {
          displayIdx = target;
          cfIdx = target;
          cfRenderAt(displayIdx);
          animId = null;
          updateDebug();
          updateControlsForCenter();
        }
      }
      animId = requestAnimationFrame(step);
    }

    function cfRenderAt(idx) {
      const saved = cfIdx;
      cfIdx = idx;
      cfRender();
      cfIdx = saved;
    }

    function handleTap(tapClientX) {
      const stageRect = stage.getBoundingClientRect();
      const tapX = tapClientX - stageRect.left;
      const cardEls = [...stage.querySelectorAll(".cf-item")];
      let closest = 0, closestDist = Infinity;
      cardEls.forEach((el, i) => {
        const r = el.getBoundingClientRect();
        const cardCx = r.left - stageRect.left + r.width / 2;
        const dist = Math.abs(tapX - cardCx);
        if (dist < closestDist) { closestDist = dist; closest = i; }
      });
      if (displayItems[closest] && displayItems[closest].isToggle) {
        hideHabits = !hideHabits;
        const togglePos = hideHabits ? 0 : Math.floor(items.length / 2);
        cfIdx = togglePos;
        cfBuild();
        return;
      }
      cfIdx = closest;
      displayIdx = closest;
      springTo(closest);
      updateControlsForCenter();
    }

    let touchStartX = null;
    let touchStartIdx = null;
    let touchDidDrag = false;
    let touchHandled = false;

    stage.addEventListener("touchstart", e => {
      touchStartX = e.touches[0].clientX;
      touchStartIdx = cfIdx;
      touchDidDrag = false;
      touchHandled = false;
      displayIdx = cfIdx;
      if (animId) { cancelAnimationFrame(animId); animId = null; }
      e.preventDefault();
    }, { passive: false });

    stage.addEventListener("touchmove", e => {
      if (touchStartX === null) return;
      const dx = e.touches[0].clientX - touchStartX;
      if (Math.abs(dx) > 4) touchDidDrag = true;
      if (!touchDidDrag) return;
      e.preventDefault();
      const n = displayItems.length;
      displayIdx = Math.max(0, Math.min(touchStartIdx + (-dx / 60), n - 1));
      cfIdx = displayIdx;
      cfRenderAt(displayIdx);
    }, { passive: false });

    stage.addEventListener("touchend", e => {
      if (touchStartX === null) return;
      const wasDrag = touchDidDrag;
      const endX = e.changedTouches[0].clientX;
      touchStartX = null;
      touchDidDrag = false;
      const n = displayItems.length;
      const target = Math.max(0, Math.min(Math.round(displayIdx), n - 1));
      cfIdx = target;
      if (!wasDrag) {
        if (!touchHandled) { touchHandled = true; handleTap(endX); }
        return;
      }
      springTo(target);
    }, { passive: false });

    stage.addEventListener("pointerdown", e => {
      if (e.pointerType === "touch") return;
      dragStartX = e.clientX;
      dragStartIdx = cfIdx;
      didDrag = false;
      if (animId) { cancelAnimationFrame(animId); animId = null; }
      stage.setPointerCapture(e.pointerId);
      e.preventDefault();
    });

    stage.addEventListener("pointermove", e => {
      if (e.pointerType === "touch") return;
      if (dragStartX === null) return;
      const dx = e.clientX - dragStartX;
      if (Math.abs(dx) > 4) didDrag = true;
      if (!didDrag) return;
      e.preventDefault();
      const n = displayItems.length;
      displayIdx = Math.max(0, Math.min(dragStartIdx + (-dx / 60), n - 1));
      cfIdx = displayIdx;
      cfRenderAt(displayIdx);
    });

    stage.addEventListener("pointerup", e => {
      if (e.pointerType === "touch") return;
      if (dragStartX === null) return;
      const wasDrag = didDrag;
      const upX = e.clientX;
      dragStartX = null;
      didDrag = false;
      const n = displayItems.length;
      const target = Math.max(0, Math.min(Math.round(displayIdx), n - 1));
      cfIdx = target;
      if (!wasDrag) {
        handleTap(upX);
        return;
      }
      springTo(target);
      dragStartIdx = null;
    });

    stage.addEventListener("pointercancel", () => {
      const n = displayItems.length;
      const target = Math.max(0, Math.min(Math.round(displayIdx), n - 1));
      cfIdx = target;
      springTo(target);
      dragStartX = null; didDrag = false; dragStartIdx = null;
    });

    cfRender();
    updateDebug();
  }
  function updateControlsForCenter() {
    const displayItems = getDisplayItems();
    const item = displayItems[Math.round(cfIdx)] || null;
    const cs = getStyleForItem(item);
    const hint = document.getElementById("active-card-hint");
    if (item && item.isToggle) {
      hint.textContent = hideHabits ? "Toggle - Show Habits" : "Toggle - Hide Habits";
    } else {
      hint.textContent = item ? item.label : "Regular card";
    }
    setColorValue("s-bg",   cs.bg);
    setColorValue("s-fg",   cs.fg);
    setColorValue("s-glow", cs.glow);
    document.getElementById("s-font").value = globalFont.value;
  }
  // ── Init ───────────────────────────────────────────────────
  updateAlphaSliderBg("s-bg");
  updateAlphaSliderBg("s-fg");
  updateAlphaSliderBg("s-glow");
  renderItemsList();
  cfBuild();
  updateControlsForCenter();
  updateDebug();
  (function(){const V_COLORS=["#00FFFF","#FF00FF","#FFFF00"];const el=document.getElementById("app-version");if(el){const n=parseInt(el.textContent.replace("v",""))||0;el.style.color=V_COLORS[n%V_COLORS.length];el.style.setProperty("color",V_COLORS[n%V_COLORS.length],"important");}})();
</script>
</body>
